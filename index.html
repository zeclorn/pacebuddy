<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pace Buddy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="theme-dark">
    <main class="app">
      <header class="app__header">
        <button
          class="theme-toggle"
          type="button"
          id="theme-toggle"
          aria-pressed="true"
        >
          Light Mode
        </button>
        <h1 class="app__title">Pace Buddy</h1>
        <p class="app__subtitle">
          Enter your run distance and time to find your pace per mile and per
          kilometer.
        </p>
      </header>

      <section class="distance-guide" aria-labelledby="distance-guide-title">
        <div class="distance-guide__header">
          <button
            class="distance-guide__toggle"
            type="button"
            id="distance-guide-toggle"
            aria-expanded="false"
            aria-controls="distance-guide-content"
          >
            Quick Distance Reference
          </button>
        </div>
        <div class="distance-guide__content" id="distance-guide-content" hidden>
          <p class="distance-guide__description">
            Select a distance to fill it into the calculator.
          </p>
          <table class="distance-guide__table">
            <thead>
              <tr>
                <th scope="col">Event</th>
                <th scope="col">Meters</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>
                  <button
                    type="button"
                    class="distance-guide__fill"
                    data-meters="400"
                  >
                    Track Lap
                  </button>
                </td>
                <td>400</td>
              </tr>
              <tr>
                <td>
                  <button
                    type="button"
                    class="distance-guide__fill"
                    data-meters="1609"
                  >
                    1 Mile
                  </button>
                </td>
                <td>1,609</td>
              </tr>
              <tr>
                <td>
                  <button
                    type="button"
                    class="distance-guide__fill"
                    data-meters="5000"
                  >
                    5K
                  </button>
                </td>
                <td>5,000</td>
              </tr>
              <tr>
                <td>
                  <button
                    type="button"
                    class="distance-guide__fill"
                    data-meters="10000"
                  >
                    10K
                  </button>
                </td>
                <td>10,000</td>
              </tr>
              <tr>
                <td>
                  <button
                    type="button"
                    class="distance-guide__fill"
                    data-meters="21097"
                  >
                    Half Marathon
                  </button>
                </td>
                <td>21,097</td>
              </tr>
              <tr>
                <td>
                  <button
                    type="button"
                    class="distance-guide__fill"
                    data-meters="42195"
                  >
                    Marathon
                  </button>
                </td>
                <td>42,195</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <form class="pace-form" id="pace-form">
        <label class="pace-form__label" for="distance">
          Distance
          <span class="pace-form__distance-row">
            <input
              class="pace-form__input"
              type="number"
              id="distance"
              min="0"
              step="any"
              placeholder="e.g. 5000"
              required
            />
            <select
              class="pace-form__input pace-form__select"
              id="distance-unit"
              aria-label="Distance unit"
            >
              <option value="meters" selected>meters</option>
              <option value="km">km</option>
              <option value="miles">miles</option>
            </select>
          </span>
        </label>

        <div class="pace-form__label" role="group" aria-labelledby="time-label">
          <span id="time-label">Time</span>
          <span class="pace-form__time-row">
            <input
              class="pace-form__input pace-form__time-input"
              type="number"
              id="time-hours"
              inputmode="numeric"
              min="0"
              step="1"
              placeholder="hh"
              aria-label="Hours"
            />
            <span class="pace-form__time-separator" aria-hidden="true">:</span>
            <input
              class="pace-form__input pace-form__time-input"
              type="number"
              id="time-minutes"
              inputmode="numeric"
              min="0"
              max="59"
              step="1"
              placeholder="mm"
              aria-label="Minutes"
            />
            <span class="pace-form__time-separator" aria-hidden="true">:</span>
            <input
              class="pace-form__input pace-form__time-input"
              type="number"
              id="time-seconds"
              inputmode="numeric"
              min="0"
              max="59"
              step="1"
              placeholder="ss"
              aria-label="Seconds"
            />
          </span>
        </div>

        <button class="pace-form__button" type="submit">Calculate Pace</button>
      </form>

      <section class="pace-result" id="pace-result" aria-live="polite"></section>
    </main>

    <script src="pace-utils.js"></script>
    <script src="script.js"></script>
  </body>
</html>
